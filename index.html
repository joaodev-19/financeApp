<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container-app">
        <h1 class="total-value">Balance <span class="currentValue">$ 0.00</span></h1>
        
        <div class="input-container">
            <input class="description-el" placeholder="Description (e.g. Coffee)" type="text">
            <input class="value-el" placeholder="Value (e.g. -5.00)" type="number">
            <button class="submit-btn">Add Transaction</button>
        </div>

        <div class="list-container">
            <ul class="items-list"></ul>
        </div>
    </div>

    <script src="core.js"></script>
</body>
</html>
